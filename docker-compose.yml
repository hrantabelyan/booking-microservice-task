services:
  php:
    build:
      context: ./.docker/php
    container_name: booking_microservice_php
    volumes:
      - ./src:/var/www/html
    networks:
      - booking_microservice_network
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mail:
        condition: service_started
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_NAME:-booking_microservice_db}
      DB_USERNAME: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      REDIS_HOST: booking_microservice_redis
      REDIS_PORT: 6379
      MAIL_HOST: booking_microservice_mail
      MAIL_PORT: 1025

  nginx:
    image: nginx:1.29.3
    container_name: booking_microservice_nginx
    ports:
      - "${WEB_SERVER_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html
      - ./.docker/nginx/default.conf.template:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - booking_microservice_network
    restart: no

  postgres:
    image: postgres:18.1
    container_name: booking_microservice_postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rootpassword}
      POSTGRES_DB: ${DB_NAME:-booking_microservice_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-booking_microservice_db}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - ./.docker/data/postgres_data:/var/lib/postgresql
    networks:
      - booking_microservice_network
    restart: no

  redis:
    image: redis:7
    container_name: booking_microservice_redis
    ports:
      - "${REDIS_PORT:-63790}:6379"
    volumes:
      - ./.docker/data/redis:/data
    networks:
      - booking_microservice_network
    restart: no

  mail:
    image: dockage/mailcatcher:0.9.0
    container_name: booking_microservice_mail
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${SMTP_GUI_PORT:-1080}:1080"
    networks:
      - booking_microservice_network
    restart: no

networks:
  booking_microservice_network:
    driver: bridge
